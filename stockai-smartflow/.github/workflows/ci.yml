# ═══════════════════════════════════════════════════════════════════
# CI — Integración Continua
#
# Se ejecuta en cada push a cualquier rama y en Pull Requests a main.
# Garantiza que el código compila y las imágenes Docker se construyen
# correctamente antes de fusionar cambios.
#
# Jobs:
#   1. lint        — valida calidad del código Node.js
#   2. build-backend  — construye y verifica imagen Docker del backend
#   3. build-frontend — construye imagen Docker del frontend
#   4. build-ai       — construye imagen Docker del AI service
# ═══════════════════════════════════════════════════════════════════

name: CI — Build & Validate

on:
  push:
    branches: ["**"]          # todas las ramas
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:

  # ── Job 1: Lint del backend ─────────────────────────────────────
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar sintaxis (node --check)
        run: find src -name "*.js" -exec node --check {} \;

  # ── Job 2: Build imagen Backend ────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen (stage production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production          # usa el stage multi-stage de producción
          push: false                 # en CI solo construye, no sube
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: stockai-backend:ci-${{ github.sha }}

  # ── Job 3: Build imagen Frontend ───────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: stockai-frontend:ci-${{ github.sha }}

  # ── Job 4: Build imagen AI Service ─────────────────────────────
  build-ai:
    name: Build AI Service Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: stockai-ai:ci-${{ github.sha }}
