apiVersion: v1
kind: Secret
metadata:
  name: stockai-secrets
  namespace: stockai
type: Opaque
# IMPORTANTE: los valores deben estar codificados en base64.
# Generar con: echo -n "valor" | base64
# En producción, usar un gestor de secretos (AWS Secrets Manager, Vault)
# y NO subir este archivo al repositorio con valores reales.
stringData:
  POSTGRES_USER: "stockai_user"
  POSTGRES_PASSWORD: "stockai_pass"           # reemplazar en producción
  JWT_SECRET: "cambiar_por_secreto_seguro_min32chars"
  JWT_REFRESH_SECRET: "cambiar_por_refresh_secreto_min32chars"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "correo@gmail.com"               # reemplazar en producción
  SMTP_PASS: "contraseña_de_aplicacion"       # reemplazar en producción
  SMTP_FROM: "StockAI SmartFlow <correo@gmail.com>"
