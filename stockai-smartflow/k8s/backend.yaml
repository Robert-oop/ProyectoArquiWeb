# ═══════════════════════════════════════════════════════════════════
# Backend Node.js — Deployment (3 réplicas) + Service + HPA
#
# 3 réplicas garantizan alta disponibilidad:
#   - Si un Pod falla, Kubernetes lo reemplaza automáticamente (auto-healing)
#   - El tráfico se distribuye entre los Pods restantes sin downtime
#   - Rolling update: actualiza un Pod a la vez, el servicio nunca cae
# ═══════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: stockai
  labels:
    app: backend
spec:
  replicas: 3                          # alta disponibilidad
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                      # máximo 1 Pod extra durante actualización
      maxUnavailable: 0                # nunca bajar de 3 Pods disponibles
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Garantiza que los 3 Pods se distribuyan en nodos diferentes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: kubernetes.io/hostname

      initContainers:
        # Espera a que PostgreSQL esté disponible antes de iniciar el backend
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Esperando PostgreSQL..."; sleep 3;
              done
              echo "PostgreSQL disponible."

      containers:
        - name: backend
          image: ghcr.io/OWNER/stockai-backend:latest   # reemplazar OWNER con tu usuario GitHub
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: stockai-config
            - secretRef:
                name: stockai-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: stockai
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---

# HPA — escala automáticamente si el CPU supera el 70%
# Requiere metrics-server instalado en el clúster
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: stockai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
