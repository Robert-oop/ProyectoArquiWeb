# ═══════════════════════════════════════════════════════════════
# Frontend Nginx — Deployment (3 réplicas) + Service + Ingress
#
# El frontend sirve archivos estáticos: sin estado, sin sesión.
# Ideal para replicación horizontal — 3 réplicas con balanceo
# round-robin nativo del Service de Kubernetes.
# ═══════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: stockai
  labels:
    app: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/OWNER/stockai-frontend:latest   # reemplazar OWNER
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: stockai
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80

---

# Ingress — punto de entrada único al clúster desde internet
# Requiere un Ingress Controller instalado (nginx-ingress o AWS ALB)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stockai-ingress
  namespace: stockai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"     # para upload de imágenes
    cert-manager.io/cluster-issuer: "letsencrypt-prod"     # TLS automático con Let's Encrypt
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - stockai.tudominio.cl
      secretName: stockai-tls
  rules:
    - host: stockai.tudominio.cl
      http:
        paths:
          # API — todas las rutas /api/* van al backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          # Frontend — todo lo demás va a Nginx (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
