# ═══════════════════════════════════════════════════════
# AI Service Python + FastAPI — Deployment + Service
#
# 2 réplicas: el procesamiento de imagen es costoso;
# escalado controlado por HPA según CPU real.
# ═══════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: stockai
  labels:
    app: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/OWNER/stockai-ai:latest   # reemplazar OWNER
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
          env:
            - name: CV_CONFIDENCE_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: stockai-config
                  key: CV_CONFIDENCE_THRESHOLD
            - name: PYTHONUNBUFFERED
              valueFrom:
                configMapKeyRef:
                  name: stockai-config
                  key: PYTHONUNBUFFERED
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 40    # FastAPI + OpenCV tarda en iniciar
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "2Gi"            # OpenCV + PyTorch requieren más memoria
              cpu: "1000m"

---

apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: stockai
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - port: 9000
      targetPort: 9000
