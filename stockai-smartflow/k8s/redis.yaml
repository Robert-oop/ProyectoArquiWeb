# ═══════════════════════════════════════════════════════
# Redis — Deployment + Service
# Estado efímero: si el Pod se reinicia, Redis se regenera.
# Para persistencia real agregar un PVC con appendonly yes.
# ═══════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: stockai
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - "allkeys-lru"
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "200m"

---

apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: stockai
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
